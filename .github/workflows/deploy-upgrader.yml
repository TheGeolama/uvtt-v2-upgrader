name: Deploy Svelte Upgrader App to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24  # Upgraded from 20 to align with GitHub Actions 2026 runners
          cache: 'npm'

      - name: Install Project Dependencies
        # Fall back to npm install if package-lock.json is missing in the repository
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Compile Production Build
        run: npm run build
        env:
          VITE_BASE_PATH: /uvtt-v2-upgrader/

      - name: Initialize Pages Metadata
        uses: actions/configure-pages@v4

      - name: Upload Static Web Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Stream Deployment to GitHub CDN
        id: deployment
        uses: actions/deploy-pages@v4
