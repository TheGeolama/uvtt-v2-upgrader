name: Deploy Web Upgrader

on:
  push:
    branches:
      - main # Or master, change to match your branch
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm" # Automatically caches node_modules for speed

      - name: Install Dependencies
        run: npm ci # Uses package-lock.json for a clean, deterministic install

      - name: Build Web App
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Assumes Vite builds to the 'dist' folder. Change to 'build' or 'public' if needed.
          path: "./dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
