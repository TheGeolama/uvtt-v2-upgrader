name: Build uvtt-v2-upgrader

on:
  push:
    tags:
      - "v*" # Automatically run when you push a version tag (e.g., v1.0.0)
  workflow_dispatch: # Gives you a manual "Run workflow" button in GitHub UI

env:
  # Prevents Svelte/Vite frontend builds from OOM crashing on GitHub runners
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - os: ubuntu-latest
            platform: linux/amd64
          - os: windows-latest
            platform: windows/amd64
          - os: macos-latest
            platform: darwin/universal

    runs-on: ${{ matrix.build.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22" # Update this if your go.mod requires a newer version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        # Ubuntu 24.04+ strictly requires libwebkit2gtk-4.1-dev
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails App
        # On Windows, you can append -nsis if you want it to package a setup installer
        run: wails build -clean -platform ${{ matrix.build.platform }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uvtt-v2-upgrader-${{ matrix.build.os }}
          path: build/bin/
          retention-days: 7
